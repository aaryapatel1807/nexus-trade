services:
  # ─── Backend (Node.js) ───────────────────────────────────────────────────────
  - type: web
    name: nexus-trade-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && node server.js
    healthCheckPath: /api/stocks
    restartPolicy:
      maxRetries: 3
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false        # ← you'll set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: nexus-trade-frontend
          type: web
          property: host

  # ─── Frontend (React/Vite Static Site) ───────────────────────────────────────
  - type: web
    name: nexus-trade-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nexus-trade-backend
          type: web
          property: host
          prefix: https://
          path: /
